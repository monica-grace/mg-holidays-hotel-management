<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG Holidays - Forget Password</title>
    
    <!-- Bootstrap 5.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --success-green: #10b981;
            --text-gray: #6b7280;
            --text-dark: #374151;
            --border-gray: #d1d5db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            overflow-x: hidden;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
        }

        .hero-section {
            flex: 1;
            background: linear-gradient(135deg, #0369a1 0%, #1e40af 100%);
            position: relative;
            overflow: hidden;
        }

        .hero-section__image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        .hero-section__overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(3, 105, 161, 0.3) 0%, rgba(30, 64, 175, 0.3) 100%);
        }


        .notification {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.95);
            color: white;
            padding: 12px 24px;
            width: 20%;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            z-index: 10;
            backdrop-filter: blur(10px);
            animation: slideDown 0.5s ease-out;
        }

        .notification__icon {
            width: 16px;
            height: 16px;
            background: currentColor;
            border-radius: 50%;
            position: relative;
        }

        .notification__icon::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: var(--success-green);
        }

        .notification__close {
            background: none;
            border: none;
            color: currentColor;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .notification__close:hover {
            opacity: 1;
        }

        .form-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: white;
        }

        .form-container {
            width: 100%;
            max-width: 400px;
        }

        .brand-title {
            font-size: 48px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 60px;
            text-align: right;
            letter-spacing: -0.025em;
        }

        .form-card {
            background: white;
        }

        .form-card__title {
            font-size: 32px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 40px;
            text-align: left;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group__label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .form-group__input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border-gray);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-group__input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: white;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        .form-group__input::placeholder {
            color: #9ca3af;
        }

        .submit-button {
            width: 100%;
            padding: 16px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }

        .submit-button:hover {
            background: #1e40af;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            font-size: 14px;
            color: var(--text-gray);
        }

        .login-link__text {
            color: var(--text-gray);
        }

        .login-link__link {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .login-link__link:hover {
            color: #1e40af;
            text-decoration: underline;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @media (max-width: 768px) {
            .auth-container {
                flex-direction: column;
            }
            
            .hero-section {
                min-height: 40vh;
            }
            
            .form-section {
                padding: 20px;
            }
            
            .brand-title {
                font-size: 36px;
                text-align: center;
                margin-bottom: 40px;
            }
            
            .form-card__title {
                font-size: 28px;
                text-align: center;
            }
            
            .notification {
                left: 20px;
                right: 20px;
                transform: none;
            }
        }

        .form-group__input.error {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .loading .submit-button {
            position: relative;
        }

        .loading .submit-button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Hero Section with Background Image -->
         <div class="notification" id="notification">
                <div class="notification__icon"></div>
                <span>Mail Sent!</span>
                <button class="notification__close" onclick="closeNotification()">&times;</button>
            </div>
        <div class="hero-section">
            <img src="./images/Rectangle.png" alt="Beautiful waterfall landscape with rocky terrain and lush greenery" class="hero-section__image" style="height: 729px;">
            <div class="hero-section__overlay"></div>
            
            <!-- Success Notification -->
            
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <div class="form-container">
                <h1 class="brand-title">MG Holidays</h1>
                
                <div class="form-card">
                    <h2 class="form-card__title">Forget Password!</h2>
                    
                    <form id="forgotPasswordForm" novalidate>
                        <div class="form-group">
                            <label for="email" class="form-group__label">Email address</label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email"
                                class="form-group__input" 
                                placeholder="Enter your email address"
                                required
                            >
                            <div class="error-message" id="emailError"></div>
                        </div>
                        
                        <button type="submit" class="submit-button">
                            Check E-Mail
                        </button>
                    </form>
                    
                    <div class="login-link">
                        <span class="login-link__text">Already have an account? </span>
                        <a href="#" class="login-link__link">Log in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3 JavaScript CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        class ForgotPasswordForm {
            constructor() {
                this.form = document.getElementById('forgotPasswordForm');
                this.emailInput = document.getElementById('email');
                this.emailError = document.getElementById('emailError');
                this.submitButton = this.form.querySelector('.submit-button');
                this.notification = document.getElementById('notification');
                
                this.init();
            }

            init() {
                this.form.addEventListener('submit', this.handleSubmit.bind(this));
                this.emailInput.addEventListener('blur', this.validateEmail.bind(this));
                this.emailInput.addEventListener('input', this.clearError.bind(this));
                
                // Auto-hide notification after 5 seconds
                setTimeout(() => {
                    this.hideNotification();
                }, 5000);
            }

            validateEmail() {
                const email = this.emailInput.value.trim();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                
                if (!email) {
                    this.showError('Email address is required');
                    return false;
                }
                
                if (!emailRegex.test(email)) {
                    this.showError('Please enter a valid email address');
                    return false;
                }
                
                this.clearError();
                return true;
            }

            showError(message) {
                this.emailInput.classList.add('error');
                this.emailError.textContent = message;
                this.emailError.style.display = 'block';
            }

            clearError() {
                this.emailInput.classList.remove('error');
                this.emailError.style.display = 'none';
            }

            showLoading() {
                this.form.classList.add('loading');
                this.submitButton.textContent = '';
            }

            hideLoading() {
                this.form.classList.remove('loading');
                this.submitButton.textContent = 'Check E-Mail';
            }

            showNotification() {
                this.notification.style.display = 'flex';
                this.notification.style.animation = 'slideDown 0.5s ease-out';
            }

            hideNotification() {
                this.notification.style.opacity = '0';
                this.notification.style.transform = 'translate(-50%, -20px)';
                setTimeout(() => {
                    this.notification.style.display = 'none';
                }, 300);
            }

            async handleSubmit(e) {
                e.preventDefault();
                
                if (!this.validateEmail()) {
                    return;
                }

                this.showLoading();

                // Simulate API call
                try {
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    // Show success notification
                    this.showNotification();
                    
                    // Reset form
                    this.form.reset();
                    
                    // Auto-hide notification after 5 seconds
                    setTimeout(() => {
                        this.hideNotification();
                    }, 5000);
                    
                } catch (error) {
                    this.showError('Something went wrong. Please try again.');
                } finally {
                    this.hideLoading();
                }
            }
        }

        // Close notification function
        function closeNotification() {
            const notification = document.getElementById('notification');
            notification.style.opacity = '0';
            notification.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 300);
        }

        // Smooth scroll behavior for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Initialize the form when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new ForgotPasswordForm();
        });

        // Add some interactive animations
        document.addEventListener('DOMContentLoaded', () => {
            const formElements = document.querySelectorAll('.form-group__input, .submit-button');
            
            formElements.forEach(element => {
                element.addEventListener('mouseenter', () => {
                    element.style.transform = 'translateY(-1px)';
                });
                
                element.addEventListener('mouseleave', () => {
                    element.style.transform = 'translateY(0)';
                });
            });
        });

        // Responsive image loading simulation
        document.addEventListener('DOMContentLoaded', () => {
            const heroImage = document.querySelector('.hero-section__image');
            
            // Simulate image loading with a placeholder gradient
            heroImage.style.background = 'linear-gradient(135deg, #0369a1 0%, #1e40af 50%, #059669 100%)';
            
            // Add subtle animation to the overlay
            const overlay = document.querySelector('.hero-section__overlay');
            overlay.style.animation = 'fadeIn 1s ease-out';
        });
    </script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</body>
</html>

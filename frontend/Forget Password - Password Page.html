<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG Holidays - Change Password</title>
    
    <!-- Bootstrap 5.3 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --success-green: #10b981;
            --text-gray: #6b7280;
            --text-dark: #374151;
            --border-gray: #d1d5db;
            --light-gray: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            overflow-x: hidden;
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
        }

        .hero-section {
            flex: 1;
            background: linear-gradient(135deg, #0369a1 0%, #1e40af 100%);
            position: relative;
            overflow: hidden;
        }

        .hero-section__image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        .hero-section__overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(3, 105, 161, 0.3) 0%, rgba(30, 64, 175, 0.3) 100%);
        }

        .notification {
            position: absolute;
            top: 20px;
            left: 50%;
            width: 20%;
            transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            z-index: 10;
            backdrop-filter: blur(10px);
            animation: slideDown 0.5s ease-out;
        }

        .notification__icon {
            width: 16px;
            height: 16px;
            background: currentColor;
            border-radius: 50%;
            position: relative;
        }

        .notification__icon::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: var(--success-green);
        }

        .notification__close {
            background: none;
            border: none;
            color: currentColor;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .notification__close:hover {
            opacity: 1;
        }

        .form-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: white;
        }

        .form-container {
            width: 100%;
            max-width: 400px;
        }

        .brand-title {
            font-size: 48px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 60px;
            text-align: right;
            letter-spacing: -0.025em;
        }

        .form-card {
            background: white;
        }

        .form-card__title {
            font-size: 32px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 40px;
            text-align: left;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group__label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .form-group__input-wrapper {
            position: relative;
        }

        .form-group__input {
            width: 100%;
            padding: 16px 20px;
            padding-right: 50px;
            border: 2px solid var(--border-gray);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-group__input:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: white;
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        .form-group__input::placeholder {
            color: #9ca3af;
        }

        .form-group__toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--light-gray);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .form-group__toggle:hover {
            color: var(--text-gray);
        }

        .form-group__toggle-icon {
            width: 16px;
            height: 16px;
        }

        .form-group__help-text {
            font-size: 12px;
            color: var(--light-gray);
            margin-top: 8px;
        }

        .submit-button {
            width: 100%;
            padding: 16px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }

        .submit-button:hover {
            background: #1e40af;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            font-size: 14px;
            color: var(--text-gray);
        }

        .login-link__text {
            color: var(--text-gray);
        }

        .login-link__link {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .login-link__link:hover {
            color: #1e40af;
            text-decoration: underline;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @media (max-width: 768px) {
            .auth-container {
                flex-direction: column;
            }
            
            .hero-section {
                min-height: 40vh;
            }
            
            .form-section {
                padding: 20px;
            }
            
            .brand-title {
                font-size: 36px;
                text-align: center;
                margin-bottom: 40px;
            }
            
            .form-card__title {
                font-size: 28px;
                text-align: center;
            }
            
            .notification {
                left: 20px;
                right: 20px;
                transform: none;
            }
        }

        .form-group__input.error {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .loading .submit-button {
            position: relative;
        }

        .loading .submit-button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .password-strength {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .password-strength__bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .password-strength__bar--weak {
            width: 25%;
            background: #ef4444;
        }

        .password-strength__bar--fair {
            width: 50%;
            background: #f59e0b;
        }

        .password-strength__bar--good {
            width: 75%;
            background: #3b82f6;
        }

        .password-strength__bar--strong {
            width: 100%;
            background: #10b981;
        }
        .hero-section__overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(3, 105, 161, 0.3) 0%, rgba(30, 64, 175, 0.3) 100%);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Hero Section with Background Image -->
         <!-- Success Notification -->
         <div class="notification" id="notification">
            <div class="notification__icon"></div>
            <span>Password Changed!</span>
            <button class="notification__close" onclick="closeNotification()">&times;</button>
        </div>
        <div class="hero-section">
            <img src="./images/Rectangle.png" alt="Beautiful waterfall landscape with rocky terrain and lush greenery" class="hero-section__image" style="height: 729px;">
            <div class="hero-section__overlay"></div>
            
            
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <div class="form-container">
                <h1 class="brand-title">MG Holidays</h1>
                
                <div class="form-card">
                    <h2 class="form-card__title">Forget Password!</h2>
                    
                    <form id="changePasswordForm" novalidate>
                        <div class="form-group">
                            <label for="password" class="form-group__label">Password</label>
                            <div class="form-group__input-wrapper">
                                <input 
                                    type="password" 
                                    id="password" 
                                    name="password"
                                    class="form-group__input" 
                                    placeholder=""
                                    required
                                >
                                <button type="button" class="form-group__toggle" onclick="togglePasswordVisibility('password', this)">
                                    <svg class="form-group__toggle-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L8.05 8.05m1.828 1.828L12 12m-1.5 1.5l4.242 4.242M15 12a3 3 0 11-6 0 3 3 0 016 0z" class="eye-off"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" class="eye" style="display: none;"/>
                                    </svg>
                                    Hide
                                </button>
                            </div>
                            <div class="form-group__help-text">Use 8 or more characters with a mix of letters, numbers & symbols</div>
                            <div class="password-strength">
                                <div class="password-strength__bar" id="passwordStrengthBar"></div>
                            </div>
                            <div class="error-message" id="passwordError"></div>
                        </div>
                        
                        <div class="form-group">
                            <label for="confirmPassword" class="form-group__label">Confirm Password</label>
                            <div class="form-group__input-wrapper">
                                <input 
                                    type="password" 
                                    id="confirmPassword" 
                                    name="confirmPassword"
                                    class="form-group__input" 
                                    placeholder=""
                                    required
                                >
                                <button type="button" class="form-group__toggle" onclick="togglePasswordVisibility('confirmPassword', this)">
                                    <svg class="form-group__toggle-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L8.05 8.05m1.828 1.828L12 12m-1.5 1.5l4.242 4.242M15 12a3 3 0 11-6 0 3 3 0 016 0z" class="eye-off"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" class="eye" style="display: none;"/>
                                    </svg>
                                    Hide
                                </button>
                            </div>
                            <div class="form-group__help-text">Use 8 or more characters with a mix of letters, numbers & symbols</div>
                            <div class="error-message" id="confirmPasswordError"></div>
                        </div>
                        
                        <button type="submit" class="submit-button">
                            Change Password
                        </button>
                    </form>
                    
                    <div class="login-link">
                        <span class="login-link__text">Already have an account? </span>
                        <a href="#" class="login-link__link">Log in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3 JavaScript CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        class ChangePasswordForm {
            constructor() {
                this.form = document.getElementById('changePasswordForm');
                this.passwordInput = document.getElementById('password');
                this.confirmPasswordInput = document.getElementById('confirmPassword');
                this.passwordError = document.getElementById('passwordError');
                this.confirmPasswordError = document.getElementById('confirmPasswordError');
                this.submitButton = this.form.querySelector('.submit-button');
                this.notification = document.getElementById('notification');
                this.passwordStrengthBar = document.getElementById('passwordStrengthBar');
                
                this.init();
            }

            init() {
                this.form.addEventListener('submit', this.handleSubmit.bind(this));
                this.passwordInput.addEventListener('input', this.handlePasswordInput.bind(this));
                this.confirmPasswordInput.addEventListener('blur', this.validatePasswordMatch.bind(this));
                this.passwordInput.addEventListener('blur', this.validatePassword.bind(this));
                
                // Auto-hide notification after 5 seconds
                setTimeout(() => {
                    this.hideNotification();
                }, 5000);
            }

            handlePasswordInput() {
                this.updatePasswordStrength();
                this.clearError('password');
                
                // Re-validate confirm password if it has a value
                if (this.confirmPasswordInput.value) {
                    this.validatePasswordMatch();
                }
            }

            updatePasswordStrength() {
                const password = this.passwordInput.value;
                const strength = this.calculatePasswordStrength(password);
                
                this.passwordStrengthBar.className = `password-strength__bar password-strength__bar--${strength}`;
            }

            calculatePasswordStrength(password) {
                let score = 0;
                
                if (password.length >= 8) score++;
                if (/[a-z]/.test(password)) score++;
                if (/[A-Z]/.test(password)) score++;
                if (/[0-9]/.test(password)) score++;
                if (/[^A-Za-z0-9]/.test(password)) score++;
                
                if (score <= 2) return 'weak';
                if (score === 3) return 'fair';
                if (score === 4) return 'good';
                return 'strong';
            }

            validatePassword() {
                const password = this.passwordInput.value;
                
                if (!password) {
                    this.showError('password', 'Password is required');
                    return false;
                }
                
                if (password.length < 8) {
                    this.showError('password', 'Password must be at least 8 characters long');
                    return false;
                }
                
                if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
                    this.showError('password', 'Password must contain uppercase, lowercase, and numbers');
                    return false;
                }
                
                this.clearError('password');
                return true;
            }

            validatePasswordMatch() {
                const password = this.passwordInput.value;
                const confirmPassword = this.confirmPasswordInput.value;
                
                if (!confirmPassword) {
                    this.showError('confirmPassword', 'Please confirm your password');
                    return false;
                }
                
                if (password !== confirmPassword) {
                    this.showError('confirmPassword', 'Passwords do not match');
                    return false;
                }
                
                this.clearError('confirmPassword');
                return true;
            }

            showError(field, message) {
                const input = field === 'password' ? this.passwordInput : this.confirmPasswordInput;
                const errorElement = field === 'password' ? this.passwordError : this.confirmPasswordError;
                
                input.classList.add('error');
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }

            clearError(field) {
                const input = field === 'password' ? this.passwordInput : this.confirmPasswordInput;
                const errorElement = field === 'password' ? this.passwordError : this.confirmPasswordError;
                
                input.classList.remove('error');
                errorElement.style.display = 'none';
            }

            showLoading() {
                this.form.classList.add('loading');
                this.submitButton.textContent = '';
            }

            hideLoading() {
                this.form.classList.remove('loading');
                this.submitButton.textContent = 'Change Password';
            }

            showNotification() {
                this.notification.style.display = 'flex';
                this.notification.style.animation = 'slideDown 0.5s ease-out';
            }

            hideNotification() {
                this.notification.style.opacity = '0';
                this.notification.style.transform = 'translate(-50%, -20px)';
                setTimeout(() => {
                    this.notification.style.display = 'none';
                }, 300);
            }

            async handleSubmit(e) {
                e.preventDefault();
                
                const isPasswordValid = this.validatePassword();
                const isMatchValid = this.validatePasswordMatch();
                
                if (!isPasswordValid || !isMatchValid) {
                    return;
                }

                this.showLoading();

                // Simulate API call
                try {
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    // Show success notification
                    this.showNotification();
                    
                    // Reset form
                    this.form.reset();
                    this.passwordStrengthBar.className = 'password-strength__bar';
                    
                    // Auto-hide notification after 5 seconds
                    setTimeout(() => {
                        this.hideNotification();
                    }, 5000);
                    
                } catch (error) {
                    this.showError('password', 'Something went wrong. Please try again.');
                } finally {
                    this.hideLoading();
                }
            }
        }

        // Toggle password visibility
        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            const eyeIcon = button.querySelector('.eye');
            const eyeOffIcon = button.querySelector('.eye-off');
            const text = button.lastChild;
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.style.display = 'block';
                eyeOffIcon.style.display = 'none';
                text.textContent = ' Show';
            } else {
                input.type = 'password';
                eyeIcon.style.display = 'none';
                eyeOffIcon.style.display = 'block';
                text.textContent = ' Hide';
            }
        }

        // Close notification function
        function closeNotification() {
            const notification = document.getElementById('notification');
            notification.style.opacity = '0';
            notification.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 300);
        }

        // Initialize the form when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new ChangePasswordForm();
        });

        // Responsive image loading simulation
        document.addEventListener('DOMContentLoaded', () => {
            const heroImage = document.querySelector('.hero-section__image');
            
            // Simulate image loading with a placeholder gradient
            heroImage.style.background = 'linear-gradient(135deg, #0369a1 0%, #1e40af 50%, #059669 100%)';
            
            // Add subtle animation to the overlay
            const overlay = document.querySelector('.hero-section__overlay');
            overlay.style.animation = 'fadeIn 1s ease-out';
        });
    </script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</body>
</html>
